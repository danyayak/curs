{% extends "base.html" %}

{% block title %}Корзина - Айдевайс{% endblock %}

{% block content %}
<div class="container">
    <h1 style="margin: 40px 0 20px;">Корзина</h1>
    
    <div class="cart-layout">
        <div class="cart-items" id="full-cart-items">
            <!-- Filled by JS -->
            <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                Загрузка корзины...
            </div>
        </div>

        <div class="summary-card">
            <h3>Итого</h3>
            <br>
            <div class="sum-row">
                <span>Товары</span>
                <span id="subtotal">0 ₽</span>
            </div>
            <div class="sum-row">
                <span>Доставка</span>
                <span>Бесплатно</span>
            </div>
            
            <div style="margin: 20px 0;">
                <input type="text" placeholder="Промокод" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;">
            </div>

            <div class="sum-row total">
                <span>К оплате</span>
                <span id="total-price">0 ₽</span>
            </div>

            <button class="btn btn-primary btn-large" style="margin-top: 20px; width: 100%;" onclick="location.href='/checkout'">Оформить заказ</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderFullCart();
    });

    function renderFullCart() {
        const container = document.getElementById('full-cart-items');
        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px;">Корзина пуста. <a href="/catalog" style="color:var(--accent); text-decoration:underline;">Перейти в каталог</a></div>';
            updateTotals(0);
            return;
        }

        container.innerHTML = '';
        let total = 0;
        
        // Group by item name to count quantity (simple logic)
        const counts = {};
        const itemsMap = {};
        
        cart.forEach(item => {
            counts[item.name] = (counts[item.name] || 0) + 1;
            itemsMap[item.name] = item;
            total += item.price;
        });

        for (const [name, count] of Object.entries(counts)) {
            const item = itemsMap[name];
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-img" style="width: 80px; height: 80px; display:flex; align-items:center; justify-content:center; background: var(--bg-secondary); border-radius: 12px;">
                    <span style="font-size: 2rem;">📱</span>
                </div>
                <div class="cart-details">
                    <div class="cart-name">${name}</div>
                    <div class="cart-meta">Цена за шт: ${item.price.toLocaleString()} ₽</div>
                    <div class="qty-ctrl" style="margin-top: 10px;">
                        <button class="qty-btn" onclick="removeItem('${name}')">-</button>
                        <span>${count}</span>
                        <button class="qty-btn" onclick="addItem('${name}', ${item.price})">+</button>
                    </div>
                </div>
                <div class="cart-price">${(item.price * count).toLocaleString()} ₽</div>
            `;
            container.appendChild(div);
        }
        
        updateTotals(total);
    }

    function updateTotals(total) {
        document.getElementById('subtotal').innerText = total.toLocaleString() + ' ₽';
        document.getElementById('total-price').innerText = total.toLocaleString() + ' ₽';
    }

    function addItem(name, price) {
        cart.push({name, price});
        localStorage.setItem('cart', JSON.stringify(cart));
        renderFullCart();
        updateCartCount();
    }

    function removeItem(name) {
        const idx = cart.findIndex(i => i.name === name);
        if (idx > -1) {
            cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderFullCart();
            updateCartCount();
        }
    }
</script>
{% endblock %}
